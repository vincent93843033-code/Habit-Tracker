<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="theme-color" content="#FAEEDA">
<meta name="description" content="個人習慣追蹤記錄">
<title>習慣記錄</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <div>
      <div class="app-title">習慣記錄</div>
      <div class="app-date" id="todayDate"></div>
    </div>
    <button class="icon-btn" id="syncBtn" aria-label="同步到 Google Sheets" title="同步到 Google Sheets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
    </button>
  </header>

  <!-- ===== 今日 ===== -->
  <main id="view-today" class="view">
    <div class="day-nav">
      <button class="day-nav-btn" id="prevDayBtn" aria-label="前一天">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-nav-center">
        <div class="day-nav-label" id="viewDateLabel"></div>
        <button class="day-nav-today hidden" id="backToTodayBtn" type="button">回到今天</button>
      </div>
      <button class="day-nav-btn" id="nextDayBtn" aria-label="後一天">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="mood-banner" id="moodBanner">
      <div class="mood-label" id="moodLabel">今日狀態</div>
      <div class="mood-row">
        <span class="mood-score" id="scoreNum">--</span>
        <span class="mood-msg" id="moodMsg"></span>
      </div>
    </div>

    <section class="habit-section">
      <div class="section-title">
        <span class="label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21c0-9 7-16 16-16-1 9-7 16-16 16z"/></svg>
          好習慣
        </span>
      </div>
      <div id="goodHabitsList"></div>
      <p class="hint" id="goodEmptyHint" style="display:none;">還沒有好習慣,到「設定」頁新增吧。</p>
    </section>

    <section class="habit-section">
      <div class="section-title">
        <span class="label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5A8.5 8.5 0 1 1 11.5 3 7 7 0 0 0 21 12.5z"/></svg>
          壞習慣
        </span>
      </div>
      <div id="badHabitsList"></div>
      <p class="hint" id="badEmptyHint" style="display:none;">還沒有壞習慣,到「設定」頁新增吧。</p>
    </section>

    <div class="save-row">
      <button class="primary-btn" id="saveBtn">儲存今日紀錄</button>
      <div class="save-status" id="saveStatus"></div>
    </div>
  </main>

  <!-- ===== 統計 ===== -->
  <main id="view-stats" class="view hidden">
    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-label">今日分數</div>
        <div class="metric-value" id="statTodayScore">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">近 7 天平均</div>
        <div class="metric-value" id="statAvgScore">--</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:18px;">
      <span class="label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="20" x2="5" y2="11"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="19" y1="20" x2="19" y2="14"/></svg>
        <span id="chartRangeLabel">過去 14 天</span>
      </span>
      <div class="tab-row">
        <button class="tab-btn active" id="btnTrend">趨勢</button>
        <button class="tab-btn" id="btnRatio">比例</button>
      </div>
    </div>
    <div class="range-row">
      <button class="range-btn" data-days="7">7天</button>
      <button class="range-btn active" data-days="14">14天</button>
      <button class="range-btn" data-days="21">21天</button>
    </div>
    <div class="chart-wrap">
      <canvas id="statsChart" role="img" aria-label="過去十四天每日習慣分數的折線圖,以及表現分布的圓餅圖">過去14天分數趨勢與表現分布</canvas>
    </div>
    <div class="chart-legend" id="chartLegend"></div>

    <div class="section-title" style="margin-top:18px;">
      <span class="label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        養成紀錄
      </span>
    </div>
    <div class="heatmap-scroll">
      <div class="heatmap-grid" id="heatmapGrid"></div>
    </div>
    <div class="heatmap-legend">
      <span>少</span>
      <span class="sw" style="background:rgb(240,153,123);"></span>
      <span class="sw" style="background:rgb(250,238,218);"></span>
      <span class="sw" style="background:rgb(192,221,151);"></span>
      <span class="sw" style="background:rgb(151,196,89);"></span>
      <span>多</span>
    </div>
  </main>

  <!-- ===== 設定 ===== -->
  <main id="view-settings" class="view hidden">
    <div class="section-title" style="margin-top:14px;">
      <span class="label">好習慣</span>
    </div>
    <p class="hint">長按左側的 <span aria-hidden="true">⠿</span> 圖示可拖曳調整順序。</p>
    <div id="goodHabitsEdit"></div>
    <div class="add-row">
      <input type="text" id="addGoodInput" placeholder="新增好習慣,例如：冥想">
      <button id="addGoodBtn" aria-label="新增好習慣">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div class="section-title" style="margin-top:24px;">
      <span class="label">壞習慣</span>
    </div>
    <p class="hint">長按左側的 <span aria-hidden="true">⠿</span> 圖示可拖曳調整順序。</p>
    <div id="badHabitsEdit"></div>
    <div class="add-row">
      <input type="text" id="addBadInput" placeholder="新增壞習慣,例如：抽菸">
      <button id="addBadBtn" aria-label="新增壞習慣">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div class="divider"></div>

    <div class="section-title">
      <span class="label">Google Sheets 同步</span>
    </div>
    <div class="field">
      <label for="sheetUrlInput">Apps Script 網址</label>
      <input type="url" id="sheetUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
      <p class="hint">貼上你部署 Apps Script 後取得的「網路應用程式」網址。設定步驟請見專案 README。</p>
    </div>
    <button class="secondary-btn" id="saveUrlBtn">儲存網址</button>
    <button class="secondary-btn" id="restoreBtn">從 Google Sheets 還原資料</button>
    <div class="save-status" id="settingsStatus"></div>

    <div class="divider"></div>

    <div class="section-title">
      <span class="label">資料管理</span>
    </div>
    <button class="secondary-btn danger" id="resetBtn">清除本機所有資料</button>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      今日
    </button>
    <button class="nav-btn" data-view="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="20" x2="5" y2="11"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="19" y1="20" x2="19" y2="14"/></svg>
      統計
    </button>
    <button class="nav-btn" data-view="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="7" cy="18" r="2"/></svg>
      設定
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
